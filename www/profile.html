<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#020617" />
  <title>Profile — Fun on the Road</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { outfit: ['Outfit','system-ui','sans-serif'] } } } };</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-slate-950 font-outfit antialiased overflow-x-hidden">

  <div class="relative flex flex-col min-h-dvh max-w-[480px] mx-auto">

    <!-- ── HEADER ─────────────────────────────── -->
    <header class="safe-top px-5 pt-6 pb-4">
      <div class="flex items-center gap-3">
        <a href="index.html" class="w-10 h-10 glass-card flex items-center justify-center text-slate-400 rounded-xl hover:text-white no-underline" aria-label="Back">
          <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <div>
          <h1 class="text-xl font-bold text-white" data-i18n="pageTitle">My Profile</h1>
          <p class="text-slate-400 text-xs" data-i18n="pageSubtitle">Your travel stats</p>
        </div>
      </div>
    </header>

    <!-- ── MAIN ───────────────────────────────── -->
    <main class="flex-1 px-5 pb-6 flex flex-col gap-4">

      <!-- Avatar + name card -->
      <div class="glass-panel p-6 flex flex-col items-center text-center animate-fade-in-up">
        <!-- Avatar ring -->
        <div class="relative mb-4">
          <div class="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-extrabold text-white"
               id="avatar-circle"
               style="background: linear-gradient(135deg, #0ea5e9, #8b5cf6)">
            <span id="avatar-initials">?</span>
          </div>
          <!-- Level badge -->
          <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/10 rounded-full px-3 py-0.5">
            <span class="text-amber-400 text-[10px] font-bold tracking-widest uppercase" id="level-badge">Level 1</span>
          </div>
        </div>

        <p class="text-white font-extrabold text-xl mt-3" id="profile-name">Traveller</p>
        <p class="text-slate-400 text-sm mt-0.5" id="level-title">Novice Explorer</p>
      </div>

      <!-- ─ GIOCHI EFFETTUATI ─ -->
      <p class="text-slate-500 text-[10px] font-bold tracking-[0.18em] uppercase px-1" data-i18n="statsSection">Your Statistics</p>

      <div class="glass-card p-6 flex items-center gap-5 animate-fade-in-up">
        <div class="w-16 h-16 rounded-2xl bg-sky-500/15 flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-gamepad text-sky-400 text-3xl"></i>
        </div>
        <div class="flex-1">
          <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-1" data-i18n="statGames">Games Played</p>
          <p class="text-white font-extrabold leading-none" id="stat-games" style="font-size:2.5rem">0</p>
        </div>
        <div class="flex-shrink-0">
          <span class="bg-sky-500/15 text-sky-400 text-[10px] font-bold px-2 py-1 rounded-lg border border-sky-500/20" data-i18n="statGamesUnit">games</span>
        </div>
      </div>

      <!-- ─ TEAM MIGLIORE (classifica persistente) ─ -->
      <div class="glass-card p-5 animate-fade-in-up" style="animation-delay:0.07s">
        <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-3" data-i18n="statBestTeam">Best Team</p>
        <ol id="team-ranking" class="flex flex-col gap-2"></ol>
      </div>

      <!-- ─ GIOCHI PER TIPO ─ -->
      <p class="text-slate-500 text-[10px] font-bold tracking-[0.18em] uppercase px-1 mt-1" data-i18n="gamesSection">Games Played</p>
      <div class="grid grid-cols-2 gap-3">
        <div class="glass-card p-4 text-center animate-fade-in-up">
          <i class="fa-solid fa-film text-sky-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-film">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gFilm">Film Quiz</p>
        </div>
        <div class="glass-card p-4 text-center animate-fade-in-up" style="animation-delay:0.05s">
          <i class="fa-solid fa-music text-sky-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-music">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gMusic">Music Buzz</p>
        </div>
        <div class="glass-card p-4 text-center animate-fade-in-up" style="animation-delay:0.10s">
          <i class="fa-solid fa-lightbulb text-amber-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-trivia">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gTrivia">Trivia</p>
        </div>
        <div class="glass-card p-4 text-center animate-fade-in-up" style="animation-delay:0.15s">
          <i class="fa-solid fa-earth-europe text-emerald-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-city">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gCity">City Quiz</p>
        </div>
      </div>

    </main>

    <div class="h-24 flex-shrink-0"></div>
  </div>

  <!-- ── BOTTOM NAV ─────────────────────────── -->
  <nav class="glass-nav fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 safe-bottom" role="navigation">
    <div class="flex items-center justify-around px-2 pt-3 pb-2">
      <a href="index.html" class="flex flex-col items-center gap-1 flex-1 py-1 no-underline" aria-label="Home">
        <div class="w-10 h-8 flex items-center justify-center rounded-xl">
          <i class="fa-solid fa-house text-lg text-slate-500"></i>
        </div>
        <span class="text-[10px] font-semibold tracking-wide text-slate-500">Home</span>
      </a>
      <a href="ranking.html" class="flex flex-col items-center gap-1 flex-1 py-1 no-underline" aria-label="Ranking">
        <div class="w-10 h-8 flex items-center justify-center rounded-xl">
          <i class="fa-solid fa-trophy text-lg text-slate-500"></i>
        </div>
        <span class="text-[10px] font-semibold tracking-wide text-slate-500">Ranking</span>
      </a>
      <a href="settings.html" class="flex flex-col items-center gap-1 flex-1 py-1 no-underline" aria-label="Settings">
        <div class="w-10 h-8 flex items-center justify-center rounded-xl">
          <i class="fa-solid fa-gear text-lg text-slate-500"></i>
        </div>
        <span class="text-[10px] font-semibold tracking-wide text-slate-500">Settings</span>
      </a>
    </div>
  </nav>

  <!-- ── SCRIPTS ────────────────────────────── -->
  <script>
    const lang  = localStorage.getItem('fotr_lang') || 'en';
    const teams = JSON.parse(localStorage.getItem('fotr_teams') || '{}');
    const games = JSON.parse(localStorage.getItem('fotr_games') || '{}');

    /* ── Avatar ── */
    const playerName = teams.team1 || 'Traveller';
    document.getElementById('avatar-initials').textContent = playerName.slice(0,2).toUpperCase();
    document.getElementById('profile-name').textContent    = playerName;
    document.getElementById('level-badge').textContent     = '⭐';
    document.getElementById('level-title').textContent     = playerName;

    /* ── Total games played ── */
    const totalGames = (games.filmQuiz || 0) + (games.musicBuzz || 0) +
                       (games.trivia   || 0) + (games.cityQuiz  || 0) +
                       (games.rather   || 0) + (games.taboo     || 0) +
                       (games.triviaHot|| 0) + (games.ratherHot || 0);
    document.getElementById('stat-games').textContent = totalGames;

    /* ── Team ranking (persistent across resets) ── */
    /* fotr_all_scores = { "TeamName": totalPoints, ... } — saved by ranking.html on reset */
    const allScores = JSON.parse(localStorage.getItem('fotr_all_scores') || '{}');

    /* Merge current live session scores so they appear even before reset */
    const liveScores = Object.assign({}, allScores);
    if (teams.team1 && (teams.score1 || 0) > 0) {
      liveScores[teams.team1] = (liveScores[teams.team1] || 0) + (teams.score1 || 0);
    }
    if (teams.team2 && (teams.score2 || 0) > 0) {
      liveScores[teams.team2] = (liveScores[teams.team2] || 0) + (teams.score2 || 0);
    }

    const T = {
      en: { noTeams:'No team data yet — play a game and reset scores!', ptsUnit:'pts',
            pageTitle:'My Profile', pageSubtitle:'Your travel stats',
            statsSection:'Your Statistics', statGames:'Games Played', statGamesUnit:'games',
            statBestTeam:'Team Rankings', gamesSection:'Games by Type',
            gFilm:'Film Quiz', gMusic:'Music Buzz', gTrivia:'Trivia', gCity:'City Quiz' },
      it: { noTeams:'Nessun dato — gioca e resetta per registrare!', ptsUnit:'pt',
            pageTitle:'Profilo', pageSubtitle:'Le tue statistiche di viaggio',
            statsSection:'Le Tue Statistiche', statGames:'Giochi Effettuati', statGamesUnit:'partite',
            statBestTeam:'Classifica Team', gamesSection:'Giochi per Tipo',
            gFilm:'Film Quiz', gMusic:'Musica', gTrivia:'Trivia', gCity:'City Quiz' },
      fr: { noTeams:'Aucune donnée — jouez et réinitialisez pour enregistrer !', ptsUnit:'pts',
            pageTitle:'Mon Profil', pageSubtitle:'Tes stats de voyage',
            statsSection:'Tes Statistiques', statGames:'Parties Jouées', statGamesUnit:'parties',
            statBestTeam:'Classement Équipes', gamesSection:'Jeux par Type',
            gFilm:'Film Quiz', gMusic:'Music Buzz', gTrivia:'Trivia', gCity:'City Quiz' },
      de: { noTeams:'Noch keine Daten — spielen und zurücksetzen!', ptsUnit:'Pkt',
            pageTitle:'Mein Profil', pageSubtitle:'Deine Reisestatistiken',
            statsSection:'Deine Statistiken', statGames:'Gespielte Partien', statGamesUnit:'Partien',
            statBestTeam:'Team-Rangliste', gamesSection:'Spiele nach Typ',
            gFilm:'Film Quiz', gMusic:'Music Buzz', gTrivia:'Trivia', gCity:'City Quiz' },
      es: { noTeams:'Sin datos — ¡juega y reinicia para registrar!', ptsUnit:'pts',
            pageTitle:'Mi Perfil', pageSubtitle:'Tus estadísticas de viaje',
            statsSection:'Tus Estadísticas', statGames:'Partidas Jugadas', statGamesUnit:'partidas',
            statBestTeam:'Clasificación Equipos', gamesSection:'Juegos por Tipo',
            gFilm:'Film Quiz', gMusic:'Music Buzz', gTrivia:'Trivia', gCity:'City Quiz' },
    };
    const t = T[lang] || T.en;

    const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
    const ranking = document.getElementById('team-ranking');
    const sorted  = Object.entries(liveScores).sort((a,b) => b[1] - a[1]);
    if (sorted.length === 0) {
      ranking.innerHTML = '<li class="text-slate-500 text-sm text-center py-3">' + t.noTeams + '</li>';
    } else {
      ranking.innerHTML = sorted.map(([name, pts], i) =>
        '<li class="flex items-center gap-3 py-2 ' + (i < sorted.length-1 ? 'border-b border-white/5' : '') + '">' +
          '<span class="text-lg w-7 text-center flex-shrink-0">' + (medals[i] || '·') + '</span>' +
          '<span class="flex-1 text-white font-semibold text-sm">' + name + '</span>' +
          '<span class="text-amber-400 font-bold text-sm">' + pts + ' ' + t.ptsUnit + '</span>' +
        '</li>'
      ).join('');
    }

    /* ── Per-game counters ── */
    document.getElementById('g-film').textContent   = games.filmQuiz  || 0;
    document.getElementById('g-music').textContent  = games.musicBuzz || 0;
    document.getElementById('g-trivia').textContent = games.trivia    || 0;
    document.getElementById('g-city').textContent   = games.cityQuiz  || 0;

    /* ── i18n ── */
    document.querySelectorAll('[data-i18n]').forEach(el => {
      if (t[el.dataset.i18n]) el.textContent = t[el.dataset.i18n];
    });
    document.documentElement.lang = lang;
  </script>

</body>
</html>
