<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#020617" />
  <title>Profile — Fun on the Road</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { fontFamily: { outfit: ['Outfit','system-ui','sans-serif'] } } } };</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-slate-950 font-outfit antialiased overflow-x-hidden">

  <div class="relative flex flex-col min-h-dvh max-w-[480px] mx-auto">

    <!-- ── HEADER ─────────────────────────────── -->
    <header class="safe-top px-5 pt-6 pb-4">
      <div class="flex items-center gap-3">
        <a href="index.html" class="w-10 h-10 glass-card flex items-center justify-center text-slate-400 rounded-xl hover:text-white no-underline" aria-label="Back">
          <i class="fa-solid fa-chevron-left text-sm"></i>
        </a>
        <div>
          <h1 class="text-xl font-bold text-white" data-i18n="pageTitle">My Profile</h1>
          <p class="text-slate-400 text-xs" data-i18n="pageSubtitle">Your travel stats</p>
        </div>
      </div>
    </header>

    <!-- ── MAIN ───────────────────────────────── -->
    <main class="flex-1 px-5 pb-6 flex flex-col gap-4">

      <!-- Avatar + name card -->
      <div class="glass-panel p-6 flex flex-col items-center text-center animate-fade-in-up">
        <!-- Avatar ring -->
        <div class="relative mb-4">
          <div class="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-extrabold text-white"
               id="avatar-circle"
               style="background: linear-gradient(135deg, #0ea5e9, #8b5cf6)">
            <span id="avatar-initials">?</span>
          </div>
          <!-- Level badge -->
          <div class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-slate-900 border border-white/10 rounded-full px-3 py-0.5">
            <span class="text-amber-400 text-[10px] font-bold tracking-widest uppercase" id="level-badge">Level 1</span>
          </div>
        </div>

        <p class="text-white font-extrabold text-xl mt-3" id="profile-name">Traveller</p>
        <p class="text-slate-400 text-sm mt-0.5" id="level-title">Novice Explorer</p>

        <!-- XP bar -->
        <div class="w-full mt-4">
          <div class="flex justify-between text-xs text-slate-500 mb-1.5">
            <span data-i18n="xpLabel">XP Progress</span>
            <span id="xp-text">0 / 100</span>
          </div>
          <div class="h-2 bg-white/5 rounded-full overflow-hidden border border-white/10">
            <div id="xp-bar" class="h-full rounded-full transition-all duration-700"
                 style="width:0%; background: linear-gradient(90deg, #0ea5e9, #8b5cf6)"></div>
          </div>
        </div>
      </div>

      <!-- ─ STAT CARDS (grandi, gamification) ─ -->
      <p class="text-slate-500 text-[10px] font-bold tracking-[0.18em] uppercase px-1" data-i18n="statsSection">Your Statistics</p>

      <!-- Viaggi Completati -->
      <div class="glass-card p-6 flex items-center gap-5 animate-fade-in-up">
        <div class="w-16 h-16 rounded-2xl bg-sky-500/15 flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-road text-sky-400 text-3xl"></i>
        </div>
        <div class="flex-1">
          <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-1" data-i18n="statTrips">Completed Trips</p>
          <p class="text-white font-extrabold leading-none" id="stat-trips" style="font-size:2.5rem">0</p>
        </div>
        <div class="flex-shrink-0 text-right">
          <span class="bg-sky-500/15 text-sky-400 text-[10px] font-bold px-2 py-1 rounded-lg border border-sky-500/20" data-i18n="statTripsUnit">trips</span>
        </div>
      </div>

      <!-- Punti Totali -->
      <div class="glass-card p-6 flex items-center gap-5 animate-fade-in-up" style="animation-delay:0.07s">
        <div class="w-16 h-16 rounded-2xl bg-amber-500/15 flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-star text-amber-400 text-3xl"></i>
        </div>
        <div class="flex-1">
          <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-1" data-i18n="statPoints">Total Points</p>
          <p class="text-white font-extrabold leading-none" id="stat-points" style="font-size:2.5rem">0</p>
        </div>
        <div class="flex-shrink-0 text-right">
          <span class="bg-amber-500/15 text-amber-400 text-[10px] font-bold px-2 py-1 rounded-lg border border-amber-500/20" data-i18n="statPointsUnit">pts</span>
        </div>
      </div>

      <!-- Livello -->
      <div class="glass-card p-6 flex items-center gap-5 animate-fade-in-up" style="animation-delay:0.14s">
        <div class="w-16 h-16 rounded-2xl bg-violet-500/15 flex items-center justify-center flex-shrink-0">
          <i class="fa-solid fa-trophy text-violet-400 text-3xl"></i>
        </div>
        <div class="flex-1">
          <p class="text-slate-400 text-xs font-semibold uppercase tracking-widest mb-1" data-i18n="statLevel">Level</p>
          <p class="text-white font-extrabold text-4xl leading-none" id="stat-level">1</p>
          <p class="text-violet-400 text-xs font-semibold mt-1" id="stat-title">Novice Explorer</p>
        </div>
        <div class="flex-shrink-0">
          <div class="w-12 h-12 rounded-xl bg-violet-500/20 flex items-center justify-center">
            <i class="fa-solid fa-medal text-violet-400 text-xl"></i>
          </div>
        </div>
      </div>

      <!-- Games played grid -->
      <p class="text-slate-500 text-[10px] font-bold tracking-[0.18em] uppercase px-1 mt-1" data-i18n="gamesSection">Games Played</p>
      <div class="grid grid-cols-2 gap-3">
        <div class="glass-card p-4 text-center animate-fade-in-up">
          <i class="fa-solid fa-film text-sky-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-film">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gFilm">Film Quiz</p>
        </div>
        <div class="glass-card p-4 text-center animate-fade-in-up" style="animation-delay:0.05s">
          <i class="fa-solid fa-music text-sky-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-music">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gMusic">Music Buzz</p>
        </div>
        <div class="glass-card p-4 text-center animate-fade-in-up" style="animation-delay:0.10s">
          <i class="fa-solid fa-lightbulb text-amber-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-trivia">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gTrivia">Trivia</p>
        </div>
        <div class="glass-card p-4 text-center animate-fade-in-up" style="animation-delay:0.15s">
          <i class="fa-solid fa-earth-europe text-emerald-400 text-xl mb-2"></i>
          <p class="text-white font-extrabold text-2xl leading-none" id="g-city">0</p>
          <p class="text-slate-400 text-[11px] mt-1" data-i18n="gCity">City Quiz</p>
        </div>
      </div>

    </main>

    <div class="h-24 flex-shrink-0"></div>
  </div>

  <!-- ── BOTTOM NAV ─────────────────────────── -->
  <nav class="glass-nav fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 safe-bottom" role="navigation">
    <div class="flex items-center justify-around px-2 pt-3 pb-2">
      <a href="index.html" class="flex flex-col items-center gap-1 flex-1 py-1 no-underline" aria-label="Home">
        <div class="w-10 h-8 flex items-center justify-center rounded-xl">
          <i class="fa-solid fa-house text-lg text-slate-500"></i>
        </div>
        <span class="text-[10px] font-semibold tracking-wide text-slate-500">Home</span>
      </a>
      <a href="ranking.html" class="flex flex-col items-center gap-1 flex-1 py-1 no-underline" aria-label="Ranking">
        <div class="w-10 h-8 flex items-center justify-center rounded-xl">
          <i class="fa-solid fa-trophy text-lg text-slate-500"></i>
        </div>
        <span class="text-[10px] font-semibold tracking-wide text-slate-500">Ranking</span>
      </a>
      <a href="settings.html" class="flex flex-col items-center gap-1 flex-1 py-1 no-underline" aria-label="Settings">
        <div class="w-10 h-8 flex items-center justify-center rounded-xl">
          <i class="fa-solid fa-gear text-lg text-slate-500"></i>
        </div>
        <span class="text-[10px] font-semibold tracking-wide text-slate-500">Settings</span>
      </a>
    </div>
  </nav>

  <!-- ── SCRIPTS ────────────────────────────── -->
  <script>
    /* Level system */
    const LEVELS = [
      { min: 0,    title: 'Novice Explorer',    label: 'Lv 1' },
      { min: 50,   title: 'Road Wanderer',       label: 'Lv 2' },
      { min: 150,  title: 'Highway Champion',    label: 'Lv 3' },
      { min: 350,  title: 'Road Trip Master',    label: 'Lv 4' },
      { min: 700,  title: 'Legendary Traveller', label: 'Lv 5' },
    ];

    function getLevel(points) {
      let lv = LEVELS[0];
      for (const l of LEVELS) {
        if (points >= l.min) lv = l;
        else break;
      }
      return lv;
    }

    function getXpProgress(points) {
      let idx = 0;
      for (let i = 0; i < LEVELS.length; i++) {
        if (points >= LEVELS[i].min) idx = i;
        else break;
      }
      const current = LEVELS[idx].min;
      const next    = LEVELS[idx + 1] ? LEVELS[idx + 1].min : current + 500;
      return Math.min(100, Math.round(((points - current) / (next - current)) * 100));
    }

    /* Load stats */
    const stats  = JSON.parse(localStorage.getItem('fotr_stats')  || '{}');
    const teams  = JSON.parse(localStorage.getItem('fotr_teams')  || '{}');
    const games  = JSON.parse(localStorage.getItem('fotr_games')  || '{}');

    const trips  = stats.trips  ?? 0;
    const points = stats.points ?? 0;
    const lv     = getLevel(points);
    const xp     = getXpProgress(points);

    /* Avatar initials from team name or default */
    const playerName = teams.team1 || 'Traveller';
    document.getElementById('avatar-initials').textContent =
      playerName.slice(0, 2).toUpperCase();
    document.getElementById('profile-name').textContent = playerName;

    /* Stats */
    document.getElementById('stat-trips').textContent  = trips;
    document.getElementById('stat-points').textContent = points;
    document.getElementById('stat-level').textContent  = LEVELS.indexOf(lv) + 1;
    document.getElementById('stat-title').textContent  = lv.title;
    document.getElementById('level-badge').textContent = lv.label;
    document.getElementById('level-title').textContent = lv.title;

    /* XP bar */
    const lvIdx = LEVELS.indexOf(lv);
    const isMaxLv = lvIdx >= LEVELS.length - 1;
    const nextThreshold = isMaxLv ? null : LEVELS[lvIdx + 1].min;
    document.getElementById('xp-text').textContent = isMaxLv
      ? points + ' pts (MAX)'
      : points + ' / ' + nextThreshold;
    setTimeout(() => {
      document.getElementById('xp-bar').style.width = (isMaxLv ? 100 : xp) + '%';
    }, 300);

    /* Per-game counters */
    document.getElementById('g-film').textContent   = games.filmQuiz  || 0;
    document.getElementById('g-music').textContent  = games.musicBuzz || 0;
    document.getElementById('g-trivia').textContent = games.trivia    || 0;
    document.getElementById('g-city').textContent   = games.cityQuiz  || 0;

    /* i18n (basic) */
    const lang = localStorage.getItem('fotr_lang') || 'en';
    const T = {
      en: { pageTitle:'My Profile', pageSubtitle:'Your travel stats', xpLabel:'XP Progress',
            statsSection:'Your Statistics', statTrips:'Completed Trips', statTripsUnit:'trips',
            statPoints:'Total Points', statPointsUnit:'pts', statLevel:'Level',
            gamesSection:'Games Played', gFilm:'Film Quiz', gMusic:'Music Buzz',
            gTrivia:'Trivia', gCity:'City Quiz' },
      it: { pageTitle:'Profilo', pageSubtitle:'Le tue statistiche di viaggio', xpLabel:'Progresso XP',
            statsSection:'Le Tue Statistiche', statTrips:'Viaggi Completati', statTripsUnit:'viaggi',
            statPoints:'Punti Totali', statPointsUnit:'punti', statLevel:'Livello',
            gamesSection:'Giochi Effettuati', gFilm:'Film Quiz', gMusic:'Musica',
            gTrivia:'Trivia', gCity:'City Quiz' },
    };
    const t = T[lang] || T.en;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      if (t[el.dataset.i18n]) el.textContent = t[el.dataset.i18n];
    });
    document.documentElement.lang = lang;
  </script>

</body>
</html>
