workflows:
  ios-release:
    name: Fun on the Road — iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    environment:
      groups:
        - ios_credentials
      vars:
        APP_ID: com.francesco.funontheroad
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install Capacitor CLI globally
        script: npm install -g @capacitor/cli

      - name: Add iOS platform
        script: npx cap add ios

      - name: Sync Capacitor iOS project
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          keychain use-provisioning-profile --path /tmp/profile.mobileprovision

      - name: Set build number from Codemagic build number
        script: |
          cd ios/App
          agvtool new-version -all $BUILD_NUMBER

      - name: Build and archive for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
