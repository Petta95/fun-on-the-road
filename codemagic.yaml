workflows:
  ios-release:
    name: Fun on the Road — iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    environment:
      groups:
        - ios_credentials
      vars:
        APP_ID: com.francesco.funontheroad
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
        APP_VERSION: "1.2"
      node: latest
      xcode: latest

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Install Capacitor CLI globally
        script: npm install -g @capacitor/cli

      - name: Add iOS platform
        script: npx cap add ios

      - name: Set app icon
        script: |
          cp store-assets/AppIcon-1024.png ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png

      - name: Sync Capacitor iOS project
        script: npx cap sync ios

      - name: Set export compliance
        script: |
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist

      - name: Set up code signing
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILES_DIR/profile.mobileprovision"

      - name: Set version and build number
        script: |
          cd ios/App
          agvtool new-marketing-version $APP_VERSION
          agvtool new-version -all $BUILD_NUMBER

      - name: Build and archive for App Store
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
